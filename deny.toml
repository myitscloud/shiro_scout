# cargo-deny configuration for ShiroScout
# Run: cargo deny check licenses
# Generate SBOM: cargo deny output cyclonedx > sbom.json
[graph]
# Use cargo graph for dependency resolution
targets = [{ triple = "x86_64-pc-windows-msvc" }]

[licenses]
unlicensed = "deny"
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "Unlicense",
]
exceptions = []

[bans]
multiple-versions = "warn"
skip = []
skip-tree = []

[sources]
unknown-git = "deny"
unknown-registry = "deny"
allow-git = []
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

[advisories]
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"
notice = "warn"
ignore = []
